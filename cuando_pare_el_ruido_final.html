<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cuando pare el ruido</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0c0a;
    --bg2: #131210;
    --text: #e8e0d0;
    --text-dim: #9a9080;
    --accent: #c4956a;
    --accent2: #8faf8f;
    --choice-bg: rgba(255,255,255,0.04);
    --choice-hover: rgba(196,149,106,0.12);
    --choice-border: rgba(196,149,106,0.25);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    color: var(--text);
    font-family: 'EB Garamond', Georgia, serif;
    font-size: 18px;
    line-height: 1.85;
    overflow: hidden;
  }

  /* GRAIN OVERLAY */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 100;
    opacity: 0.6;
  }

  /* VIGNETTE */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    pointer-events: none;
    z-index: 99;
  }

  /* TITLE SCREEN */
  #title-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 200;
    transition: opacity 1.5s ease;
  }

  #title-screen.fade-out {
    opacity: 0;
    pointer-events: none;
  }

  .title-eyebrow {
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.35em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 2.5rem;
    opacity: 0;
    animation: fadeUp 1s ease 0.5s forwards;
  }

  .title-main {
    font-family: 'EB Garamond', serif;
    font-size: clamp(2.8rem, 7vw, 5.5rem);
    font-weight: 400;
    font-style: italic;
    color: var(--text);
    letter-spacing: -0.01em;
    line-height: 1.1;
    text-align: center;
    opacity: 0;
    animation: fadeUp 1.2s ease 0.9s forwards;
  }

  .title-divider {
    width: 1px;
    height: 60px;
    background: linear-gradient(to bottom, transparent, var(--accent), transparent);
    margin: 2.5rem auto;
    opacity: 0;
    animation: fadeUp 1s ease 1.4s forwards;
  }

  .title-sub {
    font-family: 'EB Garamond', serif;
    font-size: 0.95rem;
    color: var(--text-dim);
    font-style: italic;
    opacity: 0;
    animation: fadeUp 1s ease 1.7s forwards;
  }

  .start-btn {
    margin-top: 4rem;
    font-family: 'Cinzel', serif;
    font-size: 0.7rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--accent);
    background: none;
    border: 1px solid var(--choice-border);
    padding: 0.9rem 2.5rem;
    cursor: pointer;
    transition: all 0.3s ease;
    opacity: 0;
    animation: fadeUp 1s ease 2.2s forwards;
  }

  .start-btn:hover {
    background: var(--choice-hover);
    border-color: var(--accent);
    color: var(--text);
  }

  /* GAME SCREEN */
  #game-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    opacity: 0;
    transition: opacity 1s ease;
    overflow-y: auto;
    overflow-x: hidden;
    scrollbar-width: none;
  }

  #game-screen::-webkit-scrollbar { display: none; }
  #game-screen.visible { opacity: 1; }

  /* BACKGROUND */
  #bg-layer {
    position: fixed;
    inset: 0;
    z-index: 0;
    transition: background 2s ease;
  }

  /* CONTENT */
  #content {
    position: relative;
    z-index: 10;
    width: 100%;
    max-width: 680px;
    padding: 5rem 2rem 6rem;
    display: flex;
    flex-direction: column;
    gap: 0;
  }

  /* SCENE LABEL */
  #scene-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    text-transform: uppercase;
    color: var(--text-dim);
    margin-bottom: 2.5rem;
    opacity: 0;
    transition: opacity 0.5s ease;
  }

  #scene-label.visible { opacity: 1; }

  /* TEXT AREA */
  #text-area {
    font-size: clamp(1rem, 2.5vw, 1.15rem);
    line-height: 1.9;
    color: var(--text);
    min-height: 120px;
  }

  #text-area .paragraph {
    margin-bottom: 1.4rem;
    opacity: 0;
    transform: translateY(6px);
    transition: opacity 0.6s ease, transform 0.6s ease;
  }

  #text-area .paragraph.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .highlight {
    color: var(--accent);
    font-style: italic;
  }

  /* CHOICES */
  #choices {
    margin-top: 2.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
    opacity: 0;
    transform: translateY(8px);
    transition: opacity 0.5s ease, transform 0.5s ease;
  }

  #choices.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .choice-btn {
    background: var(--choice-bg);
    border: 1px solid var(--choice-border);
    color: var(--text);
    font-family: 'EB Garamond', serif;
    font-size: 1rem;
    font-style: italic;
    padding: 1rem 1.5rem;
    text-align: left;
    cursor: pointer;
    transition: all 0.25s ease;
    line-height: 1.6;
    position: relative;
    overflow: hidden;
  }

  .choice-btn::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 2px;
    background: var(--accent);
    transform: scaleY(0);
    transition: transform 0.25s ease;
  }

  .choice-btn:hover {
    background: var(--choice-hover);
    border-color: var(--accent);
    padding-left: 2rem;
  }

  .choice-btn:hover::before { transform: scaleY(1); }

  .choice-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--accent);
    display: block;
    margin-bottom: 0.3rem;
    font-style: normal;
  }

  /* CONTINUE */
  #continue-btn {
    margin-top: 2rem;
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: none;
    cursor: pointer;
    padding: 0.5rem 0;
    transition: color 0.2s ease;
    opacity: 0;
    transition: opacity 0.5s ease, color 0.2s ease;
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  #continue-btn::after {
    content: '↓';
    font-size: 0.8rem;
  }

  #continue-btn.visible { opacity: 1; }
  #continue-btn:hover { color: var(--accent); }

  /* SCORE INDICATOR (hidden, tracks choices) */
  #score-tracker { display: none; }

  /* CURSOR BLINK */
  .cursor {
    display: inline-block;
    width: 2px;
    height: 1em;
    background: var(--accent);
    vertical-align: middle;
    margin-left: 2px;
    animation: blink 1s step-end infinite;
  }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ENDING SCREEN */
  #ending-screen {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    z-index: 300;
    opacity: 0;
    pointer-events: none;
    transition: opacity 2s ease;
    padding: 2rem;
    text-align: center;
  }

  #ending-screen.visible {
    opacity: 1;
    pointer-events: all;
  }

  .ending-label {
    font-family: 'Cinzel', serif;
    font-size: 0.6rem;
    letter-spacing: 0.4em;
    color: var(--text-dim);
    text-transform: uppercase;
    margin-bottom: 1.5rem;
  }

  .ending-title {
    font-family: 'EB Garamond', serif;
    font-size: clamp(1.8rem, 5vw, 3rem);
    font-style: italic;
    color: var(--text);
    margin-bottom: 2rem;
  }

  .ending-text {
    max-width: 560px;
    font-size: 1.05rem;
    line-height: 1.85;
    color: var(--text-dim);
    font-style: italic;
  }

  .restart-btn {
    margin-top: 3rem;
    font-family: 'Cinzel', serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--text-dim);
    background: none;
    border: 1px solid rgba(255,255,255,0.1);
    padding: 0.8rem 2rem;
    cursor: pointer;
    transition: all 0.3s ease;
  }

  .restart-btn:hover {
    color: var(--accent);
    border-color: var(--choice-border);
  }

  /* MOBILE */
  @media (max-width: 600px) {
    #content { padding: 2rem 1.25rem; }
  }

  /* ---- SOUND & VISUAL FX ---- */

  /* Mute toggle */
  #mute-btn {
    position: fixed;
    top: 1.1rem;
    right: 1.4rem;
    z-index: 400;
    background: none;
    border: none;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.95rem;
    opacity: 0.35;
    transition: opacity 0.2s ease;
    padding: 0.4rem;
    line-height: 1;
  }
  #mute-btn:hover { opacity: 0.8; }

  /* Inline notification — appears inside the text flow, where eyes already are */
  .notif-inline {
    display: flex;
    align-items: center;
    gap: 10px;
    background: rgba(18, 18, 20, 0.9);
    backdrop-filter: blur(18px);
    -webkit-backdrop-filter: blur(18px);
    border: 1px solid rgba(255, 255, 255, 0.08);
    border-radius: 12px;
    padding: 10px 13px;
    max-width: 340px;
    margin: 0.5rem 0 0.3rem;
    opacity: 0;
    transform: translateY(7px) scale(0.98);
    transition: opacity 0.3s ease, transform 0.3s ease;
    pointer-events: none;
  }
  .notif-inline.visible {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
  .notif-inline.hiding {
    opacity: 0;
    transform: translateY(-5px);
    transition: opacity 0.3s ease, transform 0.3s ease;
  }
  .notif-inline-icon {
    width: 34px; height: 34px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px;
    flex-shrink: 0;
  }
  .notif-inline-icon--news { background: #b80000; }
  .notif-inline-icon--msg  { background: #0a7efc; }
  .notif-inline-body { flex: 1; min-width: 0; }
  .notif-inline-appname {
    font-family: 'Cinzel', serif;
    font-size: 0.48rem;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255, 255, 255, 0.36);
    margin-bottom: 2px;
  }
  .notif-inline-msg {
    font-family: 'EB Garamond', serif;
    font-size: 0.83rem;
    color: rgba(255, 255, 255, 0.84);
    line-height: 1.28;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .notif-inline-time {
    font-size: 0.55rem;
    color: rgba(255, 255, 255, 0.25);
    align-self: flex-start;
    white-space: nowrap;
  }
</style>
</head>
<body>

<!-- TITLE SCREEN -->
<div id="title-screen">
  <div class="title-eyebrow">A story from Palestine</div>
  <div class="title-main">Cuando pare el ruido</div>
  <div class="title-divider"></div>
  <div class="title-sub">An interactive novel</div>
  <button class="start-btn" onclick="startGame()">Begin</button>
</div>

<!-- GAME SCREEN -->
<div id="game-screen">
  <div id="bg-layer"></div>
  <div id="content">
    <div id="scene-label"></div>
    <div id="text-area"></div>
    <div id="choices"></div>
    <button id="continue-btn" onclick="nextBeat()">Continue</button>
  </div>
</div>

<!-- ENDING SCREEN -->
<div id="ending-screen">
  <div class="ending-label">Fin</div>
  <div class="ending-title" id="ending-title"></div>
  <div class="ending-text" id="ending-text"></div>
  <button class="restart-btn" onclick="restartGame()">Play again</button>
</div>

<div id="score-tracker"></div>

<button id="mute-btn" onclick="toggleMute()" title="Toggle sound">🔊</button>

<script>
// ============================================================
// SCORE SYSTEM
// Only 5 decisions count — those reflecting real vulnerability or self-care:
// Scene 3: tells Javi she's scared (+1)
// Scene 6: tells Javi about the crossing (+1)
// Scene 8: leaves notes, rests (+1)
// Scene 9: honest answer to coordinator (+1)
// Scene 10: "I think it went well" (+1)
// 4-5 → accepted / 2-3 → waitlist / 0-1 → rejected
// ============================================================
let score = 0;
let currentBeat = 0;
let isTyping = false;
let skipTyping = false;
let typingTimeout = null;

// Scenes that count for scoring — keyed by beat index of the choice beat
// We track which beats have scoring choices
const scoringBeats = new Set();

// Backgrounds per scene (color gradients, no images needed)
const sceneBgs = {
  0: 'radial-gradient(ellipse at 60% 40%, #1a1610 0%, #0d0c0a 70%)',
  1: 'radial-gradient(ellipse at 30% 60%, #0f1510 0%, #0a0d0b 70%)',
  2: 'radial-gradient(ellipse at 70% 30%, #12100a 0%, #0d0c0a 70%)',
  3: 'radial-gradient(ellipse at 40% 50%, #0e1018 0%, #0a0b0d 70%)',
  4: 'radial-gradient(ellipse at 60% 60%, #100e0a 0%, #0d0c0a 70%)',
  5: 'radial-gradient(ellipse at 50% 40%, #0f1212 0%, #0b0d0d 70%)',
};

// ============================================================
// STORY BEATS
// Each beat: { scene, label, paragraphs, choices?, bg? }
// ============================================================
const story = [

  // ---- SCENE 1 ----
  {
    scene: 1,
    label: 'Day 1 — Home · Tulkarm',
    bg: 0,
    paragraphs: [
      'The phone screen lights up the room before you open your eyes.',
      "Your mom's side of the bed is already empty. She wakes up before you. She always does.",
      "You've been waking up like this for days. Check the time. Check the news. Check if anything changed overnight.",
      'Today something did.',
    ],
    auto: true,
  },
  {
    scene: 1,
    label: 'Day 1 — Home · Tulkarm',
    bg: 0,
    paragraphs: [
      '<span class="highlight">CEASEFIRE ANNOUNCED — Parties agree to halt hostilities</span>',
      'You read it three times. Then you read the notifications. Javi, 11 messages. Salma. Nadine.',
      'You put the phone down on the sheets.',
      "Somewhere in the building, someone is crying. You can't tell if it's relief or grief. Maybe it's both. Maybe there's no difference anymore when you've been counting the dead for months — and these aren't even your dead. Not directly. But you stopped believing that distinction meant anything a long time ago.",
      "The street outside is starting to make noise. A different kind of noise.",
      "You're still in bed.",
    ],
    choices: [
      { text: 'Open the shutters.', value: 1 },
      { text: 'Stay a little longer.', value: 0 },
    ],
  },
  {
    scene: 1,
    label: 'Day 1 — Home · Tulkarm',
    bg: 0,
    branchA: [
      "The light comes in hard. Tulkarm is outside, actually outside — a woman talking to her neighbor, kids running, a car honking for no reason except that it can.",
      "You watch from the window. You don't go down yet.",
      "There's a part of you that wanted to feel something bigger today. You're still waiting for it.",
      '"Leen. Come eat." Your mom, from the kitchen.',
      "You're not hungry. But you go.",
    ],
    branchB: [
      'You put the phone face down.',
      'The ceasefire isn\'t peace. You know that. Javi will text "finally" and "now you can—" and he means well. He always means well. But he\'s in Santiago de Compostela, waking up in his own apartment, and the distance between that and this is not just kilometers.',
      'You give yourself five more minutes.',
      '"Leen. Come eat." Your mom, from the kitchen.',
      "You're not hungry. But you go.",
    ],
    converge: [
      "The kitchen smells like za'atar and olive oil. Your mom is already dressed, already moving. The news is on.",
      '"Did you see?" she says, not looking up.',
      '"Yes."',
      '"Hamdullah."',
      "You don't answer that part. She doesn't expect you to.",
    ],
  },

  // ---- SCENE 2 ----
  {
    scene: 2,
    label: 'Day 1 — Outside · Tulkarm',
    bg: 1,
    paragraphs: [
      "You haven't been out since before it got bad. You don't count the balcony.",
      "You put on clothes that aren't pajamas. That already feels like something.",
      "Your mom doesn't say anything when you grab your keys. She just watches you for a second, the way she does, and then goes back to the dishes.",
      'You close the door behind you.',
    ],
    auto: true,
  },
  {
    scene: 2,
    label: 'Day 1 — Outside · Tulkarm',
    bg: 1,
    paragraphs: [
      'The street is quieter than you expected.',
      "Some people are out, but not many. A few men standing near the corner, not really talking. A woman hanging laundry from a window above you. Someone has opened their shop but is just sitting in the doorway, not doing much.",
      "Everyone looks like they slept badly. Everyone looks like they're waiting for something — another announcement, another sound, something to confirm that today is actually different.",
      "You know that feeling. You're doing the same thing.",
      "You walk without direction. Your legs feel strange after weeks of the house. The sun is strong and you forgot how strong it gets.",
      "There's a cat sitting on a wall watching the street. You stand next to it for a moment. It doesn't move.",
      "This is the most company you've had outside in weeks.",
      "On the way back you pass the bakery. It's open. You go in, buy something small, eat it outside.",
      "It's not a celebration. It's just bread, and sun, and your legs remembering how to walk.",
      "That's enough for today.",
    ],
    auto: true,
  },

  // ---- SCENE 3 ----
  {
    scene: 3,
    label: 'Day 1 — The call',
    bg: 2,
    paragraphs: [
      "The sun is lower now. You check the house — your dad left a while ago, your brother too. Your mom is out.",
      'You sit on your bed and call Javi.',
      "His face appears on the screen. He's in his chair in Santiago — that same chair he really should replace by now, the one that looks one bad day away from collapse. He looks relieved in a way that's almost hard to look at directly.",
      '"Leen." Just your name, but the way he says it.',
      '"Hi."',
      '"How are you. How is it there. Are you okay."',
      '"I went outside today," you say.',
      '"Yeah?"',
      '"Just for a walk. Nothing special."',
      "He smiles. You can tell he's been worried and is now trying not to show how worried he was.",
    ],
    auto: true,
  },
  {
    scene: 3,
    label: 'Day 1 — The call',
    bg: 2,
    paragraphs: [
      "You talk for a while. He asks about your mom, about the neighborhood, about what the street looked like. He asks good questions — he always tries. But there's a version of this that he can't fully reach and you both know it and neither of you says it.",
      "At some point he brings up the master's.",
      '"Maybe now things move faster," he says. "With the ceasefire. The application, the visa process—"',
      '"Maybe," you say.',
      '"You\'re the strongest candidate they\'ll see. You know that."',
      'You look at the wall for a second.',
    ],
    counts: true, choices: [
      { text: "Tell him you're scared they won't take you.", value: 1 },
      { text: '"I know," you say. Keep it to yourself.', value: 0 },
    ],
  },
  {
    scene: 3,
    label: 'Day 1 — The call',
    bg: 2,
    branchA: [
      '"I just—" you start. "What if they don\'t. What if the application goes nowhere and everything stays exactly like this."',
      "Javi is quiet for a moment. You can almost see him weighing it — trying to find the answer that's actually true, not just the one that sounds right.",
      '"Then we figure out the next thing," he says finally. "But I don\'t think that\'s what happens."',
      '"You don\'t know that."',
      '"No," he admits. "But I know you."',
      "You don't answer. But something in you loosens, just slightly.",
    ],
    branchB: [
      '"I know," you say.',
      "And you do know, objectively. Your grades, your languages, your profile on paper. You know what you look like from the outside.",
      "It's the other thing — the feeling that something will get in the way, that it always does, that having a Palestinian passport means the path is never as straight as it looks — that you keep to yourself.",
      "Javi talks a little more about the program. You listen. You're good at listening.",
    ],
    converge: [
      'Before you hang up he says, "I miss you."',
      '"I miss you too."',
      '"Soon," he says.',
      "You smile because he needs you to, and also because a small part of you still believes it.",
      'The screen goes dark. You hear the front door.',
      'You put the phone away before your mom reaches the hallway.',
    ],
  },

  // ---- SCENE 4 ----
  {
    scene: 4,
    label: 'Days later — Birzeit',
    bg: 3,
    paragraphs: [
      "A few days later. You're back.",
      "Birzeit feels the same and different at the same time — the campus, the noise, the smell of coffee from the place near the faculty building. Like a muscle memory you didn't know you still had.",
      'Salma texts you before you even get to class: "where are you"',
      '"Near the gate," you write back.',
      '"STAY THERE"',
      "They find you at the same time, from opposite directions, which shouldn't be possible but with Salma and Nadine somehow always is.",
      "Salma hugs you first, hard, the kind that means she's not going to talk about how worried she was. Nadine says your name like she's checking you're actually there.",
      'For a moment nobody says anything.',
      'Then Salma says: "You look terrible."',
      '"Thank you," you say.',
      '"I mean it in a loving way."',
      '"I know."',
    ],
    auto: true,
  },
  {
    scene: 4,
    label: 'Days later — Birzeit',
    bg: 3,
    paragraphs: [
      "You find a spot outside. The sun is still good at this hour. Someone nearby is playing music from their phone — something you half recognize.",
      "It takes a few minutes to find the rhythm of being with people again. Your body forgot how to just sit with someone without listening for something outside.",
      "Nadine tells you what you missed. Campus drama, a professor who lost it during an online class, a rumor about exams being pushed back. Normal things. Deliberately normal things.",
      'You let it wash over you. It helps.',
      'At some point Salma looks at you.',
      '"How are you actually."',
      "Not a question. The way she says it means she already knows part of the answer and is giving you space to fill in the rest.",
    ],

"This time." She holds your gaze. "One committee's decision doesn't unhappen it."

"This was the first programme to open applications this cycle," you say. "The others open in the next few weeks. Same profile, same research proposal — but now I know how the interview goes. I know I can get into that room."

Salma nods. Just: "Okay. Then that's what we do."

We. You notice that.

Later, you sit at your desk. Asal settles next to the laptop. You open a new tab. Deadlines, programmes, application portals. The next ones are already open.

The door didn't open this time. But you found it. You know where it is now.

That's tonight's job done.`,
  },
};

// ============================================================
// SFX — real audio files + synthesized haptics
// ============================================================
const SFX = (() => {
  let ctx = null;
  let _muted = false;
  const pool = {};

  const FILES = {
    notification: 'audio/iphone_16_messege_tone.mp3',
    cortinas:     'audio/freesound_community-cortinas-101613.mp3',
    cooking:      'audio/justsomesounds-cooking-sound-442650.mp3',
    keys:         'audio/freesound_community-rattlingkeys-40988.mp3',
    door:         'audio/soundreality-opening-door-411632.mp3',
    crying:       'audio/freesoundsxx-woman-crying-softly-268484.mp3',
    children:     'audio/freesound_community-children-playing-14828.mp3',
    carhorn:      'audio/universfield-double-car-horn-352443.mp3',
  };

  function preload() {
    Object.entries(FILES).forEach(([key, src]) => {
      const a = new Audio(src);
      a.preload = 'auto';
      pool[key] = a;
    });
  }

  function getCtx() {
    if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
    if (ctx.state === 'suspended') ctx.resume();
    return ctx;
  }

  function tone(freq, type, dur, vol, delay = 0) {
    const c = getCtx();
    const now = c.currentTime + delay;
    const osc = c.createOscillator();
    const g = c.createGain();
    osc.connect(g); g.connect(c.destination);
    osc.type = type;
    osc.frequency.setValueAtTime(freq, now);
    g.gain.setValueAtTime(vol, now);
    g.gain.exponentialRampToValueAtTime(0.0001, now + dur);
    osc.start(now); osc.stop(now + dur + 0.02);
  }

  return {
    get muted() { return _muted; },
    set muted(v) { _muted = v; },

    init() {
      try { getCtx(); } catch(e) {}
      preload();
    },

    play(key, vol = 1.0) {
      if (_muted || !pool[key]) return;
      const a = pool[key].cloneNode();
      a.volume = Math.min(1, vol);
      a.play().catch(() => {});
    },

    // Synthesized haptic phone buzz — no audio file needed for this
    phoneVibrate() {
      if (_muted) return;
      [0, 0.21].forEach(d => {
        tone(86, 'sawtooth', 0.13, 0.30, d);
        tone(50, 'square',   0.13, 0.11, d);
      });
    },

    choicesAppear() {
      if (_muted) return;
      tone(528, 'sine', 0.32, 0.05, 0);
      tone(660, 'sine', 0.26, 0.04, 0.08);
    },
    choiceSelect() {
      if (_muted) return;
      tone(660, 'sine', 0.10, 0.07, 0);
      tone(880, 'sine', 0.08, 0.05, 0.04);
    }
  };
})();

// ============================================================
// Inline notification — injected into the text flow, at eye level
// ============================================================
function injectInlineNotif(textArea, type, appname, message, onDone) {
  const el = document.createElement('div');
  el.className = 'notif-inline';
  el.innerHTML =
    '<div class="notif-inline-icon notif-inline-icon--' + type + '">' +
      (type === 'news' ? '\uD83D\uDCF0' : '\uD83D\uDCAC') +
    '</div>' +
    '<div class="notif-inline-body">' +
      '<div class="notif-inline-appname">' + appname + '</div>' +
      '<div class="notif-inline-msg">' + message + '</div>' +
    '</div>' +
    '<div class="notif-inline-time">now</div>';
  textArea.appendChild(el);
  el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

  requestAnimationFrame(() => requestAnimationFrame(() => el.classList.add('visible')));

  setTimeout(() => {
    el.classList.remove('visible');
    el.classList.add('hiding');
    setTimeout(() => { el.remove(); if (onDone) onDone(); }, 320);
  }, 2400);
}

// Shift the scene background gradient mid-beat
function setBg(gradient) {
  const bg = document.getElementById('bg-layer');
  if (bg) bg.style.background = gradient;
}

// ============================================================
// BEAT EFFECTS
// pre_N  → fires just before paragraph N starts typing
// post_N → fires after paragraph N finishes; receives (textArea, next)
//          and MUST call next() when done (controls paragraph pacing)
//
// Branch beats: N is index within merged array (branch + converge).
//   branchA = 5 paras → converge[0] at index 5
//   branchB = 4 paras → converge[0] at index 4
// ============================================================
const beatEffects = {

  // Beat 0 — "The phone screen lights up the room"
  0: {
    pre_0() {
      SFX.phoneVibrate();
      setBg('radial-gradient(ellipse at 50% 65%, #0c1118 0%, #060709 75%)');
    }
  },

  // Beat 1 — ceasefire headline, then messages, then crying
  1: {
    post_0(ta, next) {    // after CEASEFIRE paragraph types out
      SFX.play('notification', 0.75);
      injectInlineNotif(ta, 'news', 'Al Jazeera', 'CEASEFIRE ANNOUNCED \u2014 Parties agree to halt hostilities', next);
    },
    post_1(ta, next) {    // after "Javi, 11 messages" paragraph types out
      SFX.play('notification', 0.55);
      injectInlineNotif(ta, 'msg', 'Javi', '11 messages  \u00B7  Salma  \u00B7  Nadine', next);
    },
    pre_3() {             // "Somewhere in the building, someone is crying."
      SFX.play('crying', 0.10);
    }
  },

  // Beat 2 — branch (shutters A / stay B) + converge (kitchen)
  2: {
    pre_0() {
      if (lastChoice === 'A') {
        // Curtain opens
        SFX.play('cortinas', 0.65);
        // Background warms as light comes in
        setTimeout(() => setBg('radial-gradient(ellipse at 55% 40%, #1e1b10 0%, #100e08 70%)'), 700);
        // "kids running" — text reaches that word around 1500ms into typing
        setTimeout(() => SFX.play('children', 0.50), 1500);
        // "a car honking for no reason" — text reaches that around 3200ms
        setTimeout(() => SFX.play('carhorn', 0.55), 3200);
      }
    },
    pre_4() { if (lastChoice === 'B') SFX.play('cooking', 0.35); },
    pre_5() { if (lastChoice === 'A') SFX.play('cooking', 0.35); }
  },

  // Beat 3 — Scene 2: grab keys, close door
  3: {
    pre_2() { SFX.play('keys', 0.60); },
    pre_3() { SFX.play('door', 0.70); }
  }
};

// Mute toggle (called by #mute-btn)
function toggleMute() {
  SFX.muted = !SFX.muted;
  const btn = document.getElementById('mute-btn');
  if (btn) btn.textContent = SFX.muted ? '\uD83D\uDD07' : '\uD83D\uDD0A';
}


// ============================================================
// ENGINE
// ============================================================
let beatIndex = 0;
let lastChoice = null; // 'A' or 'B'

function startGame() {
  SFX.init(); // unlock AudioContext during this user gesture
  const ts = document.getElementById('title-screen');
  ts.classList.add('fade-out');
  setTimeout(() => {
    ts.style.display = 'none';
    const gs = document.getElementById('game-screen');
    gs.classList.add('visible');
    renderBeat(0);
  }, 1500);
}

function renderBeat(index) {
  beatIndex = index;
  const beat = story[index];
  if (!beat) { showEnding(); return; }

  // Scroll game screen to top for each new beat
  const gs = document.getElementById('game-screen');
  gs.scrollTo({ top: 0 });

  // Background
  const bg = document.getElementById('bg-layer');
  bg.style.background = sceneBgs[beat.bg] || sceneBgs[0];

  // Label
  const label = document.getElementById('scene-label');
  label.textContent = beat.label || '';
  setTimeout(() => label.classList.add('visible'), 100);

  // Determine paragraphs to show
  let paras = [];

  if (beat.paragraphs) {
    paras = beat.paragraphs;
  } else if (beat.branchA || beat.branchB) {
    const branch = lastChoice === 'A' ? beat.branchA : beat.branchB;
    paras = [...(branch || []), ...(beat.converge || [])];
  }

  // Clear
  const textArea = document.getElementById('text-area');
  const choicesEl = document.getElementById('choices');
  const continueBtn = document.getElementById('continue-btn');
  textArea.innerHTML = '';
  choicesEl.innerHTML = '';
  choicesEl.classList.remove('visible');
  continueBtn.classList.remove('visible');

  // Render paragraphs with typewriter
  renderParagraphs(paras, beat, () => {
    if (beat.choices) {
      showChoices(beat.choices, beat.counts);
    } else if (beat.isLast) {
      showContinue(true);
    } else {
      showContinue(false);
    }
  });
}

function renderParagraphs(paras, beat, onDone) {
  const textArea = document.getElementById('text-area');
  let i = 0;

  function renderNext() {
    if (i >= paras.length) { onDone(); return; }

    const div = document.createElement('div');
    div.className = 'paragraph';
    textArea.appendChild(div);

    // pre_N: fires just before paragraph N starts typing (sounds, bg shifts)
    const bfx = beatEffects[beatIndex];
    if (bfx && bfx['pre_' + i]) bfx['pre_' + i]();

    setTimeout(() => {
      div.classList.add('visible');
      typeText(div, paras[i], () => {
        const paraIdx = i;
        i++;
        // post_N: fires after paragraph N finishes (inline content, pacing control)
        // post_N MUST call next() to continue — it controls the delay itself
        if (bfx && bfx['post_' + paraIdx]) {
          bfx['post_' + paraIdx](textArea, () => setTimeout(renderNext, 180));
        } else {
          setTimeout(renderNext, 180);
        }
      });
    }, 80);
  }

  renderNext();
}

function typeText(el, html, onDone) {
  // Handle HTML (spans etc) — type plain text, inject HTML tags instantly
  const hasHTML = /<[^>]+>/.test(html);
  if (hasHTML) {
    el.innerHTML = html;
    if (onDone) onDone();
    return;
  }

  const text = html;
  let i = 0;
  const cursor = document.createElement('span');
  cursor.className = 'cursor';
  el.appendChild(cursor);

  isTyping = true;
  skipTyping = false;

  // Click to skip
  const skipHandler = () => { skipTyping = true; };
  document.addEventListener('click', skipHandler, { once: true });

  function type() {
    if (skipTyping) {
      el.innerHTML = text;
      isTyping = false;
      if (onDone) onDone();
      return;
    }

    if (i < text.length) {
      cursor.remove();
      el.innerHTML = text.slice(0, i + 1);
      el.appendChild(cursor);
      i++;

      // Scroll into view
      el.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

      const char = text[i - 1];
      const delay = (char === '.' || char === ',' || char === '—') ? 60 : 22;
      typingTimeout = setTimeout(type, delay);
    } else {
      cursor.remove();
      isTyping = false;
      document.removeEventListener('click', skipHandler);
      if (onDone) onDone();
    }
  }

  type();
}

function showChoices(choices, counts) {
  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';

  choices.forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    const label = idx === 0 ? 'A' : 'B';
    btn.innerHTML = `<span class="choice-label">Option ${label}</span>${c.text}`;
    btn.onclick = () => makeChoice(label, c.value, counts);
    choicesEl.appendChild(btn);
  });

  // Scroll choices into view after a moment
  setTimeout(() => {
    SFX.choicesAppear();
    choicesEl.classList.add('visible');
    choicesEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 200);
}

function makeChoice(label, value, counts) {
  SFX.choiceSelect();
  lastChoice = label;
  if (counts) score += value;
  nextBeat();
}

function showContinue(isFinal) {
  const btn = document.getElementById('continue-btn');
  if (isFinal) {
    btn.innerHTML = 'Epilogue <span style="font-size:0.8rem">↓</span>';
  } else {
    btn.innerHTML = 'Continue <span style="font-size:0.8rem">↓</span>';
  }
  setTimeout(() => {
    btn.classList.add('visible');
    btn.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }, 300);
}

function nextBeat() {
  const label = document.getElementById('scene-label');
  label.classList.remove('visible');
  setTimeout(() => renderBeat(beatIndex + 1), 300);
}

function showEnding() {
  // 4-5 pts → accepted / 2-3 → waitlist / 0-1 → rejected
  let endingKey;
  if (score >= 4) endingKey = 'accepted';
  else if (score >= 2) endingKey = 'waitlist';
  else endingKey = 'rejected';

  const ending = endings[endingKey];
  document.getElementById('ending-title').textContent = ending.title;
  document.getElementById('ending-text').textContent = ending.text;

  const es = document.getElementById('ending-screen');
  setTimeout(() => es.classList.add('visible'), 800);
}

function restartGame() {
  score = 0;
  beatIndex = 0;
  lastChoice = null;

  const es = document.getElementById('ending-screen');
  es.classList.remove('visible');

  const ts = document.getElementById('title-screen');
  ts.style.display = 'flex';
  ts.style.opacity = '1';
  ts.classList.remove('fade-out');

  const gs = document.getElementById('game-screen');
  gs.scrollTo({ top: 0 });
  gs.classList.remove('visible');
}
</script>
